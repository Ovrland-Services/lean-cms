name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.7"
          bundler-cache: true

      - name: gem build smoke test
        run: |
          gem build lean_cms.gemspec
          ls -lh lean_cms-*.gem

      - name: bundler-audit
        run: |
          gem install bundler-audit
          bundle-audit check --update

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install libvips
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips42 libvips-dev

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4.7"
          bundler-cache: true

      - name: Run Minitest
        run: bundle exec rake test
